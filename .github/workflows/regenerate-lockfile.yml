name: Regenerate Lockfile

on:
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo with full history so pushes work
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node (required to run npm commands)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install dependencies and regenerate lockfile
      - name: Install dependencies
        run: |
          npm install
          npm ci

      # 4️⃣ Commit and push package-lock.json using your PAT
      - name: Commit new lockfile
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add package-lock.json
          git commit -m "Regenerate package-lock.json via GitHub Actions" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kevin-G-Roteda/deadline-sync.git HEAD:main

name: Regenerate Lockfile

on:
  workflow_dispatch: # allows you to manually trigger it

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # Ensures full git history so commits/pushes work
      - name: Commit new lockfile
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add package-lock.json
          git commit -m "Regenerate package-lock.json via GitHub Actions" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Kevin-G-Roteda/deadline-sync.git HEAD:main
